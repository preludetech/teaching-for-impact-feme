<svg width="794" height="1123" viewBox="0 0 794 1123" xmlns="http://www.w3.org/2000/svg">

  <rect width="100%" height="100%" fill="white"></rect>

  <!-- Title -->
  <text x="397" y="72" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#004b6c">
    From Activity Design to Training Materials
  </text>

  <text x="397" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#507d8e">
    Turning a learning activity into concrete materials for delivery, feedback, and checking
  </text>

  <!-- Left panel -->
  <rect x="60" y="160" width="300" height="790" rx="20" fill="#1d647d"></rect>
  <text x="210" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">
    Activity Design
  </text>

  <rect x="90" y="235" width="240" height="54" rx="10" fill="white" opacity="0.14"></rect>
  <text x="210" y="268" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Example activity
  </text>

  <text x="95" y="325" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Objective
  </text>
  <text x="95" y="350" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    Learners analyse a local dataset and
  </text>
  <text x="95" y="372" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    interpret findings in small groups.
  </text>

  <text x="95" y="425" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Learners do
  </text>
  <text x="95" y="450" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • review an example
  </text>
  <text x="95" y="474" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • work in pairs or small groups
  </text>
  <text x="95" y="498" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • discuss patterns and meaning
  </text>
  <text x="95" y="522" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • share an interpretation
  </text>

  <text x="95" y="575" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Participation
  </text>
  <text x="95" y="600" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • think time before discussion
  </text>
  <text x="95" y="624" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • multiple ways to contribute
  </text>
  <text x="95" y="648" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • structured group roles
  </text>

  <text x="95" y="701" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Support
  </text>
  <text x="95" y="726" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • guided example first
  </text>
  <text x="95" y="750" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • prompt questions
  </text>
  <text x="95" y="774" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • facilitator check-in points
  </text>

  <text x="95" y="827" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Evidence / check
  </text>
  <text x="95" y="852" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • what will show the objective
  </text>
  <text x="95" y="874" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
      was reached?
  </text>
  <text x="95" y="898" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    • what feedback is needed next?
  </text>

  <text x="95" y="931" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="white">
    Output
  </text>
  <text x="95" y="956" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    Short group interpretation or
  </text>
  <text x="95" y="978" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    annotated worksheet response
  </text>

  <!-- Right panel -->
  <rect x="434" y="160" width="300" height="790" rx="20" fill="#638fa8"></rect>
  <text x="584" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="white">
    Materials to Create
  </text>

  <!-- Material boxes -->
  <rect x="464" y="245" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="273" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Slide / visual
  </text>
  <text x="484" y="294" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Introduces the task, purpose,
  </text>
  <text x="484" y="312" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    and what success looks like
  </text>

  <rect x="464" y="338" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="366" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Activity instructions
  </text>
  <text x="484" y="387" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Step-by-step guidance learners
  </text>
  <text x="484" y="405" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    can follow independently
  </text>

  <rect x="464" y="431" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="459" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Worksheet / template
  </text>
  <text x="484" y="480" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Captures observations,
  </text>
  <text x="484" y="498" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    interpretations, and outputs
  </text>

  <rect x="464" y="524" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="552" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Dataset / example
  </text>
  <text x="484" y="573" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Gives learners something
  </text>
  <text x="484" y="591" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    meaningful and relevant to analyse
  </text>

  <rect x="464" y="617" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="645" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Facilitation notes
  </text>
  <text x="484" y="666" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Helps the facilitator support,
  </text>
  <text x="484" y="684" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    prompt, and adapt in real time
  </text>

  <rect x="464" y="710" width="240" height="92" rx="14" fill="white"></rect>
  <text x="484" y="738" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Feedback / evidence tool
  </text>
  <text x="484" y="759" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Helps check whether learners met
  </text>
  <text x="484" y="777" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    the objective and supports
  </text>
  <text x="484" y="795" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    useful feedback or reflection
  </text>

  <rect x="464" y="817" width="240" height="78" rx="14" fill="white"></rect>
  <text x="484" y="845" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#004b6c">
    Reusable OER version
  </text>
  <text x="484" y="866" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    Makes the activity shareable,
  </text>
  <text x="484" y="884" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#004b6c">
    adaptable, and reusable later
  </text>

  <!-- Connecting arrows -->
  <line x1="360" y1="284" x2="434" y2="284" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,284 420,276 420,292" fill="#9cb5cb"></polygon>

  <line x1="360" y1="377" x2="434" y2="377" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,377 420,369 420,385" fill="#9cb5cb"></polygon>

  <line x1="360" y1="470" x2="434" y2="470" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,470 420,462 420,478" fill="#9cb5cb"></polygon>

  <line x1="360" y1="563" x2="434" y2="563" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,563 420,555 420,571" fill="#9cb5cb"></polygon>

  <line x1="360" y1="656" x2="434" y2="656" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,656 420,648 420,664" fill="#9cb5cb"></polygon>

  <line x1="360" y1="848" x2="434" y2="756" stroke="#d46852" stroke-width="4"></line>
  <polygon points="434,756 420,753 426,766" fill="#d46852"></polygon>

  <line x1="360" y1="960" x2="434" y2="856" stroke="#9cb5cb" stroke-width="3"></line>
  <polygon points="434,856 421,851 428,864" fill="#9cb5cb"></polygon>

  <!-- Feedback loop annotation -->
  <path d="M704,756 C748,756 748,915 584,915 C466,915 420,885 420,848" fill="none" stroke="#d46852" stroke-width="3" stroke-dasharray="8 7"></path>
  <polygon points="420,848 428,862 412,860" fill="#d46852"></polygon>

  <text x="642" y="928" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#d46852">
    Feedback informs revision
  </text>

  <!-- Bottom insight -->
  <rect x="90" y="982" width="614" height="96" rx="16" fill="#d46852"></rect>
  <text x="397" y="1016" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="white">
    Good materials do more than present content
  </text>
  <text x="397" y="1044" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    They enable participation, support learning, and help you check whether the objective was reached.
  </text>

</svg>