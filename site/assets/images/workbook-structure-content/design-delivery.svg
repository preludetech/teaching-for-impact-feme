<svg width="794" height="1123" viewBox="0 0 794 1123" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="white"></rect>

  <!-- Title -->
  <text x="397" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#004b6c" font-weight="bold">
    From Design to Delivery
  </text>

  <text x="397" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#507d8e">
    Turning learning design into effective training practice
  </text>

  <!-- Vertical flow line -->
  <line x1="397" y1="160" x2="397" y2="1000" stroke="#9cb5cb" stroke-width="3"></line>

  <!-- STEP 1: DESIGN -->
  <rect x="147" y="180" width="500" height="180" rx="16" fill="#1d647d"></rect>

  <text x="397" y="220" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="bold">
    1. DESIGN (Module 1)
  </text>

  <text x="397" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    Define what learning should achieve
  </text>

  <text x="200" y="290" font-family="Arial" font-size="13" fill="white">
    • Learning outcomes
  </text>
  <text x="200" y="315" font-family="Arial" font-size="13" fill="white">
    • Constraints and context
  </text>
  <text x="200" y="340" font-family="Arial" font-size="13" fill="white">
    • Activity design
  </text>

  <text x="430" y="290" font-family="Arial" font-size="13" fill="white">
    • Participation
  </text>
  <text x="430" y="315" font-family="Arial" font-size="13" fill="white">
    • Co-creation
  </text>
  <text x="430" y="340" font-family="Arial" font-size="13" fill="white">
    • Assessment alignment
  </text>

  <!-- Arrow -->
  <polygon points="397,380 385,410 409,410" fill="#638fa8"></polygon>

  <!-- STEP 2: MATERIALS -->
  <rect x="147" y="430" width="500" height="200" rx="16" fill="#638fa8"></rect>

  <text x="397" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="bold">
    2. MATERIALS (Module 2)
  </text>

  <text x="397" y="505" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    Turn activities into usable training resources
  </text>

  <text x="200" y="540" font-family="Arial" font-size="13" fill="white">
    • Slides and visuals
  </text>
  <text x="200" y="565" font-family="Arial" font-size="13" fill="white">
    • Worksheets and templates
  </text>
  <text x="200" y="590" font-family="Arial" font-size="13" fill="white">
    • Instructions and facilitation notes
  </text>

  <text x="430" y="540" font-family="Arial" font-size="13" fill="white">
    • Datasets / examples
  </text>
  <text x="430" y="565" font-family="Arial" font-size="13" fill="white">
    • OER-ready resources
  </text>
  <text x="430" y="590" font-family="Arial" font-size="13" fill="white">
    • Reusable materials
  </text>

  <!-- Arrow -->
  <polygon points="397,650 385,680 409,680" fill="#638fa8"></polygon>

  <!-- STEP 3: DELIVERY -->
  <rect x="147" y="700" width="500" height="200" rx="16" fill="#d46852"></rect>

  <text x="397" y="740" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" font-weight="bold">
    3. DELIVERY (In Practice)
  </text>

  <text x="397" y="775" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="white">
    Facilitate learning in real contexts
  </text>

  <text x="200" y="810" font-family="Arial" font-size="13" fill="white">
    • Facilitation and guidance
  </text>
  <text x="200" y="835" font-family="Arial" font-size="13" fill="white">
    • Managing participation
  </text>
  <text x="200" y="860" font-family="Arial" font-size="13" fill="white">
    • Supporting learners
  </text>

  <text x="430" y="810" font-family="Arial" font-size="13" fill="white">
    • Adapting in real time
  </text>
  <text x="430" y="835" font-family="Arial" font-size="13" fill="white">
    • Working within constraints
  </text>
  <text x="430" y="860" font-family="Arial" font-size="13" fill="white">
    • Enabling co-creation live
  </text>

  <!-- Feedback loop -->
  <path d="M147,950 C147,1050 647,1050 647,950" fill="none" stroke="#004b6c" stroke-width="3"></path>

  <polygon points="147,950 165,940 165,960" fill="#004b6c"></polygon>

  <text x="397" y="1030" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#004b6c">
    Reflection and iteration improve future design
  </text>

</svg>